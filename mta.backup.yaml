_schema-version: 3.3.0
ID: complaint-management
version: 1.0.0
description: "A simple CAP project."

parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  # CAP backend service
  - name: complaint-management-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: complaint-management-auth
      - name: complaint-management-db
      - name: complaint-management-destination

  # Deploys CDS database artifacts to the HDI container
  - name: complaint-management-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: complaint-management-db

  # Deploys the built Fiori application to HTML5 Application Repository
  - name: complaint-management-app-deployer
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
        - name: complaintmanagementcomplaints
          artifacts:
            - complaints.zip
          target-path: app/
    requires:
      - name: complaint-management-auth
      - name: srv-api
      - name: complaint-management-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    parameters:
      config:
        destinations:
          - Name: srv-api
            URL: ~{srv-api/srv-url}
            Type: HTTP
            ProxyType: Internet
            Authentication: NoAuthentication
            HTML5.ForwardAuthToken: true
            HTML5.DynamicDestination: true

  # Builds the Fiori Elements application
  - name: complaintmanagementcomplaints
    type: html5
    path: app/complaints
    properties:
      sap.cloud.service: complaint.management
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []

  # Creates Work Zone discovery destinations at subaccount level
  - name: complaint-management-destinations
    type: com.sap.application.content
    requires:
      - name: complaint-management-auth
        parameters:
          service-key:
            name: complaint-management-auth-key

      - name: complaint-management-html5-repo-host
        parameters:
          service-key:
            name: complaint-management-html5-repo-host-key

      - name: srv-api

      - name: complaint-management-destination
        parameters:
          content-target: true

    build-parameters:
      no-source: true

    parameters:
      content:
        subaccount:
          existing_destinations_policy: update
          destinations:
            - Name: complaint-management-html5-repository
              ServiceInstanceName: complaint-management-html5-repo-host
              ServiceKeyName: complaint-management-html5-repo-host-key
              sap.cloud.service: complaint.management

            - Name: complaint-management-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: complaint-management-auth
              ServiceKeyName: complaint-management-auth-key
              sap.cloud.service: complaint.management


resources:
  # XSUAA authentication and application roles
  - name: complaint-management-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: complaint-management-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
        role-collections:
          - name: "SupportAgent (complaint-management ${org}-${space})"
            description: "generated"
            role-template-references:
              - "$XSAPPNAME.SupportAgent"

          - name: "ComplaintManager (complaint-management ${org}-${space})"
            description: "generated"
            role-template-references:
              - "$XSAPPNAME.ComplaintManager"

  # HANA HDI container
  - name: complaint-management-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # HTML5 Application Repository host
  - name: complaint-management-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  # Destination service used by Work Zone managed App Router
  - name: complaint-management-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
    requires:
      - name: srv-api